<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Files</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-6">

<header class="mb-6">
    <a href="/" class="text-blue-400 hover:underline">&larr; Back</a>
    <h1 class="text-2xl font-bold mt-2">Manage Uploaded Files</h1>
    <p class="text-gray-400 text-sm">Select files to delete from the storage directory.</p>
</header>

<main class="bg-gray-900 p-4 rounded-lg max-w-3xl">
    {% if message %}
        <p class="text-green-400 mb-4">{{ message }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <table class="w-full text-left">
            <thead>
                <tr class="text-gray-400 text-sm border-b border-gray-800">
                    <th class="py-2">
                        <label class="inline-flex items-center gap-2 cursor-pointer">
                            <input id="selectAllCheckbox" type="checkbox" class="rounded bg-gray-700" />
                            <span>Select All</span>
                        </label>
                    </th>
                    <th class="py-2">File</th>
                    <th class="py-2">Size (KB)</th>
                </tr>
            </thead>
            <tbody>
                {% for f in files %}
                <tr class="border-b border-gray-800">
                    <td class="py-2">
                        <input type="checkbox" name="selected" value="{{ f.name }}" class="file-select-checkbox rounded bg-gray-700" />
                    </td>
                    <td class="py-2"><a class="text-blue-300 hover:underline" href="{{ media_url }}{{ f.name }}">{{ f.name }}</a></td>
                    <td class="py-2">{{ f.size_kb }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="py-4 text-gray-400">No files uploaded yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="mt-4 flex gap-2">
            <button class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded" type="submit">Delete Selected</button>
            <a href="/" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded">Cancel</a>
        </div>
    </form>
</main>

<script>
    const selectAll = document.getElementById('selectAllCheckbox');
    if (selectAll) {
        selectAll.addEventListener('change', function () {
            const inputs = document.querySelectorAll('.file-select-checkbox');
            inputs.forEach(i => i.checked = selectAll.checked);
        });
    }
</script>

</body>
</html>
